services:
  quiqr:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5150:5150"
    environment:
      - NODE_ENV=production
      - PORT=5150
      # Optional: override frontend build path inside the container
      # - FRONTEND_PATH=/app/packages/frontend/build
    volumes:
      # Mount a volume for persistent user data
      - quiqr-data:/root/.quiqr-standalone
    restart: unless-stopped
    container_name: quiqr

volumes:
  quiqr-data:
    driver: local
